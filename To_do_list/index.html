<!-- // class method -->
 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Todo App</title>
  <style>
    body {
      font-family: Arial;
    }
    ul {
      list-style: none;
      padding: 0;
    }
    li {
      margin: 8px 0;
    }
    .deletebtn {
      margin-left: 10px;
      color: white;
      background: red;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- Form -->
  <form id="fi">
    <input 
      type="text" 
      id="addtask" 
      placeholder="Enter a task"
    />
    <button type="submit">Add Task</button>
  </form>

  <!-- Task List -->
  <ul id="tasklist"></ul>

  <script src="script.js"></script>
</body>
</html>
